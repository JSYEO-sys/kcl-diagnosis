<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KCL 자가진단 - 보호된 환경</title> <!-- App title -->
  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(18, 20, 24, 0.85);
      --primary-teal: #00F2FF;
      --neon-magenta: #FF00FF;
      --text-main: #FFFFFF;
      --text-dim: #A0AAB5;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #1b2028 0%, #0b0c10 100%);
    }

    .login-container {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
      text-align: center;
    }

    .login-container h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #FFFFFF, var(--primary-teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: var(--primary-teal);
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-teal), #0099FF);
      color: #0b0c10;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.7);
      transform: translateY(-2px);
    }

    .error-msg {
      color: var(--neon-magenta);
      font-size: 14px;
      margin-top: 15px;
      min-height: 20px;
      display: none;
    }

    .footer-note {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>보안 인증 (KCL Diagnosis)</h1>
    
    <form id="loginForm">
      <div class="input-group">
        <label class="input-label">ADMIN ID</label>
        <input type="email" id="email" class="input-field" placeholder="yeojunseok@gmail.com" required />
      </div>
      
      <div class="input-group">
        <label class="input-label">PASSWORD</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required />
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <button type="submit" class="btn-login">시스템 접속</button>
    </form>

    <div class="footer-note">
      본 시스템은 EU 규제 전용 관리자 자가진단 플랫폼입니다.<br/>
      외부인의 무단 접근 및 열람을 엄격히 금지합니다.
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        
        if (result.success) {
          window.location.href = result.redirect;
        } else {
          errorMsg.textContent = result.message || '인증에 실패했습니다.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '서버 접속 오류가 발생했습니다.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
